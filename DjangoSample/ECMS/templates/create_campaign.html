{% extends "base.html" %}

{% block content %}

<div class="card">

<h2>Create Campaign</h2>

<form method="post">

{% csrf_token %}

<label>Campaign Name</label>
{{form.campaign_name}}

<label>Subject Line</label>
{{form.subject_line}}

<label>Email Content</label>
{{form.email_content}}

<label>Scheduled Time</label>
{{form.scheduled_time}}

<button class="btn btn-success" type="submit">
Create Campaign
</button>

</form>

</div>

{% endblock %}
